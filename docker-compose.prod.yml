# Production compose — covers BOTH deployment topologies from one file:
#
#   * app-only (default): just the app on 127.0.0.1:3000, behind YOUR host nginx.
#         make deploy          (or: docker compose -f docker-compose.prod.yml up -d --no-build)
#
#   * bundled stack: app + nginx + certbot, no host setup needed. The nginx and
#     certbot services live behind the "bundled" profile so they only start here:
#         make stack-up        (or: docker compose -f docker-compose.prod.yml --profile bundled up -d --no-build)
#
# See DEPLOY.md. The image is always the prebuilt one from GHCR — never built on
# the server (the build's yarn install OOM-kills small VMs; use `make image`).

services:
  invictus:
    image: ghcr.io/invictus-solutions-llc/invictus:latest
    container_name: invictus
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Read from a .env file (or the host's shell env) next to this compose
      # file — never hardcode the real key here, this file is committed.
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      # Optional delivery-inbox override; empty means "deliver to the email
      # displayed on the site" (content/contact.json).
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL:-}
      # Optional: tokens enabling the private /api/resume endpoint (see
      # .env.example). Empty = endpoint disabled.
      - RESUME_ACCESS_TOKENS=${RESUME_ACCESS_TOKENS:-}
    # Bound to loopback: reachable from the host (its nginx) in app-only mode,
    # and from the bundled nginx over the compose network. Never public directly.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Real content (name, contact info, job history) lives only on this host and
      # is never baked into the image — populate it once from content/*.example.json.
      - ./content:/app/content:ro

  # --- bundled stack only (activate with: --profile bundled) ---
  nginx:
    image: nginx:1.27-alpine
    container_name: invictus-nginx
    profiles: ["bundled"]
    restart: unless-stopped
    depends_on:
      - invictus
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: invictus-certbot
    profiles: ["bundled"]
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renews any due certificate twice a day; a no-op until the first real
    # certificate exists (see nginx/init-letsencrypt.sh for the first one).
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'

volumes:
  certbot-www:
  certbot-certs:
