services:
  invictus:
    image: ghcr.io/invictus808/invictus:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: invictus
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Read from a .env file (or the host's shell env) next to this compose
      # file — never hardcode the real key here, this file is committed.
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      # Optional delivery-inbox override; empty means "deliver to the email
      # displayed on the site" (content/contact.json).
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL:-}
    # No host port mapping — only reachable inside the compose network, via
    # nginx, which is the sole public-facing entrypoint.
    expose:
      - "3000"
    volumes:
      # Real content (name, contact info, job history) lives only on this host and
      # is never baked into the image — populate it once from content/*.example.json.
      - ./content:/app/content:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: invictus-nginx
    restart: unless-stopped
    depends_on:
      - invictus
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: invictus-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renews any due certificate twice a day; a no-op until the first real
    # certificate exists (see nginx/init-letsencrypt.sh for the first one).
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'

volumes:
  certbot-www:
  certbot-certs:
