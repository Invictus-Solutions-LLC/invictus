version: "3.9"

services:
  invictus:
    image: ghcr.io/invictus808/invictus:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: invictus
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Read from a .env file (or the host's shell env) next to this compose
      # file — never hardcode the real key here, this file is committed.
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    ports:
      - "3000:3000"
    volumes:
      # Real content (name, contact info, job history) lives only on this host and
      # is never baked into the image — populate it once from content/*.example.json.
      - ./content:/app/content:ro
