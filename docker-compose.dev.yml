services:
  invictus:
    image: invictus-solutions-llc/invictus:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: invictus
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL:-}
      - RESUME_ACCESS_TOKENS=${RESUME_ACCESS_TOKENS:-}
    ports:
      - "3000:3000"
    volumes:
      - ./src/:/app/src/
      - ./public/:/app/public/
      - ./content/:/app/content/
    # depends_on:
    #   - serviceName