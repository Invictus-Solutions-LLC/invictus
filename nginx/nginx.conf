user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Only set "Connection: upgrade" when the client actually asked to
    # upgrade (WebSocket) — required for Next.js's HMR/dev traffic and
    # is harmless/no-op for ordinary requests.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Proxy-level rate limit for API routes (contact form, resume). The app
    # has its own per-route limiters; this is the cheaper first line that
    # sheds abusive traffic before it reaches Node. 30 req/min per client IP
    # with a small burst is far above any legitimate use.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
