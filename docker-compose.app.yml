# App-only deployment, for servers that already run their own nginx (or another
# reverse proxy) terminating TLS on :80/:443. Unlike docker-compose.prod.yml,
# this runs ONLY the app container — no bundled nginx or certbot — and publishes
# it on loopback so your host proxy can forward to it.
#
#   Internet -> host nginx (:80/:443, TLS) -> 127.0.0.1:3000 (this container)
#
# See DEPLOY.md -> "Behind an existing host nginx" and the server-block template
# at nginx/host-invictus.conf.example.

services:
  invictus:
    # Prebuilt image from GHCR — never built on the server. Use `make docker-build`
    # locally if you need to build for testing.
    image: ghcr.io/invictus808/invictus:latest
    container_name: invictus
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL:-}
      - RESUME_ACCESS_TOKENS=${RESUME_ACCESS_TOKENS:-}
    # Bound to loopback: reachable only from the host (its nginx), never directly
    # from the public internet. Change the left-hand 3000 if that host port is taken.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Real content lives only on the host and is bind-mounted read-only —
      # never baked into the image. Populate it once from content/*.example.json.
      - ./content:/app/content:ro
    # Health is reported by the image's built-in HEALTHCHECK (GET /api/health).
